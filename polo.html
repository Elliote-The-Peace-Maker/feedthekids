<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booking Details | STA Travel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f5f6fa; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .back-btn { text-decoration: none; color: #00224f; font-weight: bold; }
        .car-header { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .price-box { background: #e8f5e9; padding: 20px; border-radius: 8px; text-align: center; }
        .btn-confirm { background: #28a745; color: white; border: none; padding: 15px 30px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn"><i class="fa fa-arrow-left"></i> Back to search</a>
    
    <div id="car-content">
        <!-- Content loaded by JS -->
        <h1>Loading Car Details...</h1>
    </div>
</div>

<script>
    // In a real app, this data would come from a database. 
    // Here we use a function to "find" the car details based on the ID.
    const urlParams = new URLSearchParams(window.location.search);
    const carId = urlParams.get('id');

    // Simple simulation of finding the car in the database
    if (carId) {
        // We simulate fetching the specific car (usually you'd fetch from an API)
        // For this demo, we just show details based on common patterns
        renderDetails();
    }

    function renderDetails() {
        const content = document.getElementById('car-content');
        // This is a placeholder - in a real scenario, you'd find the object in your 'allCars' array
        content.innerHTML = `
            <div class="car-header">
                <div>
                    <span style="color: #28a745; font-weight: bold;">AVAILABLE NOW</span>
                    <h1>Vehicle ID: #${carId}</h1>
                    <p style="font-size: 18px; color: #666;">Standard Rental Agreement - South Africa</p>
                </div>
                <div class="price-box">
                    <div style="font-size: 12px;">Total for 1 Day</div>
                    <div style="font-size: 28px; font-weight: bold; color: #00224f;">ZAR 1,250</div>
                </div>
            </div>

            <img src="https://via.placeholder.com/600x300/f9f9f9/00224f?text=Vehicle+Image" style="width: 100%; border-radius: 8px; margin: 20px 0;">

            <div class="specs-grid">
                <div><strong><i class="fa fa-check-circle"></i> Theft Protection</strong> included</div>
                <div><strong><i class="fa fa-check-circle"></i> Collision Damage</strong> included</div>
                <div><strong><i class="fa fa-gas-pump"></i> Full to Full</strong> fuel policy</div>
                <div><strong><i class="fa fa-road"></i> Unlimited Mileage</strong></div>
            </div>

            <div style="background: #fff3cd; padding: 15px; border-radius: 8px; margin: 20px 0;">
                <i class="fa fa-exclamation-triangle"></i> <strong>Important:</strong> A refundable security deposit of ZAR 3,000 is required at pick-up.
            </div>

            <button class="btn-confirm" onclick="alert('Booking Confirmed! Reference: #SA-${carId}')">Confirm This Rental</button>
        `;
    }
</script>

</body>
</html>
