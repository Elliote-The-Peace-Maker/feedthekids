<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | STA Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --navy: #1e272e; --primary: #28a745; --bg-light: #f4f7f6; }
        body { font-family: 'Open Sans', sans-serif; background-color: var(--bg-light); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .auth-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        .brand { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.8rem; color: var(--navy); text-align: center; margin-bottom: 30px; display: block; text-decoration: none; }
        .brand span { color: var(--primary); }
        
        .form-control { padding: 12px; margin-bottom: 15px; border-radius: 6px; }
        .btn-auth { background: var(--primary); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-auth:hover { background: #218838; }
        
        .toggle-text { text-align: center; margin-top: 20px; font-size: 14px; color: #7f8c8d; }
        .toggle-text a { color: var(--primary); font-weight: bold; cursor: pointer; text-decoration: none; }
        
        #error-msg { color: #d63031; font-size: 13px; text-align: center; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="index.html" class="brand">STA <span>Travefl</span></a>
        
        <h5 class="fw-bold mb-4 text-center" id="form-title">Sign In</h5>
        
        <div id="error-msg"></div>

        <form id="auth-form">
            <input type="email" id="email" class="form-control" placeholder="Email Address" required>
            <input type="password" id="password" class="form-control" placeholder="Password" required>
            <button type="submit" class="btn-auth" id="submit-btn">Sign In</button>
        </form>

        <div class="toggle-text">
            <span id="toggle-prompt">Don't have an account?</span> 
            <a onclick="toggleMode()" id="toggle-link">Create one</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script>
        // 1. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // UI Logic
        let isLogin = true;
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const togglePrompt = document.getElementById('toggle-prompt');
        const toggleLink = document.getElementById('toggle-link');
        const errorMsg = document.getElementById('error-msg');

        function toggleMode() {
            isLogin = !isLogin;
            formTitle.innerText = isLogin ? "Sign In" : "Create Account";
            submitBtn.innerText = isLogin ? "Sign In" : "Register";
            togglePrompt.innerText = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleLink.innerText = isLogin ? "Create one" : "Sign in";
            errorMsg.style.display = 'none';
        }

        // Handle Submit (Sign Up / Sign In)
        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            if (isLogin) {
                // LOGIN
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        window.location.href = "my-bookings.html"; // Redirect on success
                    })
                    .catch((error) => showError(error.message));
            } else {
                // REGISTER
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        window.location.href = "my-bookings.html"; // Redirect on success
                    })
                    .catch((error) => showError(error.message));
            }
        });

        function showError(message) {
            errorMsg.innerText = message;
            errorMsg.style.display = 'block';
            submitBtn.innerText = isLogin ? "Sign In" : "Register";
            submitBtn.disabled = false;
        }
    </script>
</body>
</html>
