<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Secure Payment | SafariStay</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        .method-card { border: 2px solid #eee; border-radius: 10px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .method-card:hover, .method-card.active { border-color: #006ce4; background: #f0f7ff; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Final Step: Secure Payment</h2>
            <p class="text-muted">Complete your booking for <span id="carLabel" class="text-dark fw-bold">...</span></p>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0 mb-3">
                    <h5 class="fw-bold mb-3">Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Vehicle</span> <span id="summaryName" class="fw-bold">--</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span>Total Due</span> <span id="finalAmount" class="text-primary fw-bold fs-4">R 0.00</span>
                    </div>
                    <hr>
                    <p class="small text-muted"><i class="fa fa-info-circle"></i> Payments are processed securely in ZAR.</p>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="fw-bold mb-3">Select Payment Method</h5>
                    
                    <div class="method-card active mb-3" onclick="selectMethod('card')">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><i class="fa fa-credit-card me-2"></i> <strong>Credit/Debit Card</strong></div>
                            <img src="https://upload.wikimedia.org/wikipedia/commons/b/ba/Paystack_logo.png" height="15">
                        </div>
                    </div>

                    <div class="method-card mb-3" onclick="selectMethod('ozow')">
                        <div class="d-flex justify-content-between align-items-center">
                            <div><i class="fa fa-university me-2"></i> <strong>Instant EFT / Ozow</strong></div>
                            <span class="badge bg-success">Fastest</span>
                        </div>
                    </div>

                    <div class="method-card mb-4" onclick="selectMethod('manual')">
                        <div><i class="fa fa-receipt me-2"></i> <strong>Manual Bank Transfer</strong></div>
                    </div>

                    <button onclick="payNow()" class="btn btn-primary w-100 py-3 fw-bold">PAY NOW</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const total = params.get('total');
        const email = params.get('email');
        const car = params.get('name');

        document.getElementById('finalAmount').innerText = "R " + parseInt(total).toLocaleString();
        document.getElementById('carLabel').innerText = car;
        document.getElementById('summaryName').innerText = car;

        function selectMethod(method) {
            document.querySelectorAll('.method-card').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        function payNow() {
            // Note: Paystack South Africa handles Cards AND EFT (Instant EFT) 
            // inside their popup automatically.
            let handler = PaystackPop.setup({
                key: 'pk_test_xxxxxxxxxxxxxxxxxxxxxxxx', // Replace with your real Public Key
                email: email,
                amount: total * 100, // Cents
                currency: 'ZAR',
                ref: 'SS-' + Math.floor((Math.random() * 1000000000) + 1),
                callback: function(response) {
                    window.location.href = "success.html?ref=" + response.reference;
                }
            });
            handler.openIframe();
        }
    </script>
</body>
</html>
